<div class="shared-navbar" id="shared-navbar">
  <style id="shared-note-nav">
  :root{--shared-nav-height:64px}
  .shared-navbar{position:fixed;left:0;right:0;top:12px;z-index:10000;padding:0 16px}
  .shared-navbar .note-nav{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:0 auto;padding:10px 14px;max-width:1200px;background:rgba(255,255,255,0.96);backdrop-filter:blur(6px);border:1px solid #D4CEBC;border-radius:14px;box-shadow:0 18px 40px rgba(14,15,20,0.06)}
  .shared-navbar .note-nav a,.shared-navbar .note-nav button{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:1px solid #D4CEBC;background:#fff;color:#0E0F14;padding:8px 12px;border-radius:999px;cursor:pointer;text-decoration:none;transition:transform .15s ease,border-color .15s ease,color .15s ease,box-shadow .15s ease,background-color .15s ease}
  .shared-navbar .note-nav a:hover,.shared-navbar .note-nav button:hover{transform:translateY(-2px);border-color:#C84B1F;color:#C84B1F;box-shadow:0 10px 28px rgba(14,15,20,.06)}
  .shared-navbar .note-nav a.active{background:#0E0F14;border-color:#0E0F14;color:#fff}
  .shared-navbar .note-nav a.active:hover{background:#C84B1F;border-color:#C84B1F;color:#fff}
  .shared-navbar .note-nav .primary{background:#0E0F14;border-color:#0E0F14;color:#fff}
  .shared-navbar .note-nav .primary:hover{background:#C84B1F;border-color:#C84B1F;color:#fff}

  /* Add top spacing to page content when navbar is present */
  body.has-shared-navbar main,
  body.has-shared-navbar .crossnote,
  body.has-shared-navbar .layout { padding-top: calc(var(--shared-nav-height) + 22px) !important; }
  </style>
  <div class="note-nav">
    <button type="button" class="primary" onclick="goBack()">Back</button>
    <a href="index.html" data-page="index">Home</a>
    <a href="sandbox.html" data-page="sandbox">Sandbox</a>
    <a href="kubernetes.html" data-page="kubernetes">Kubernetes</a>
    <a href="kuber.html" data-page="kuber">Kubectl</a>
    <a href="skaffold.html" data-page="skaffold">Skaffold</a>
    <a href="eks.html" data-page="eks">EKS</a>
    <a href="codespace.html" data-page="codespace">codeSpace</a>
  </div>
</div>

<script>
(function() {
  const currentFile = window.location.pathname.split('/').pop() || 'index.html';
  const pageName = currentFile.replace('.html', '');
  const link = document.querySelector(`#shared-navbar a[data-page="${pageName}"]`);
  if(link) link.classList.add('active');
})();
</script>
